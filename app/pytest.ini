[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: testes unitários
    integration: testes de integração
    edge_case: casos extremos
    slow: testes lentos
