name: Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Executar testes e cobertura
        run: python -m pytest

      - name: Executar testes de mutação
        shell: bash
        run: |
            rm -f .mutmut-cache .mutmut-cache-journal
            python -m mutmut run \
            --CI \
            --paths-to-mutate app/services \
            --runner "python -m pytest -q -o addopts='' tests/test_cupons.py 
            tests/test_pedidos.py tests/test_pagamentos.py tests/test_regras_negocio.py 
            tests/test_bva_particionamento.py" \
            > mutmut-run.log 2>&1
            KILLED=$(python -m mutmut result-ids killed | wc -w)
            SURVIVED=$(python -m mutmut result-ids survived | wc -w)
            SUSPICIOUS=$(python -m mutmut result-ids suspicious | wc -w)
            TIMEOUT=$(python -m mutmut result-ids timeout | wc -w)
            TOTAL=$((KILLED + SURVIVED + SUSPICIOUS + TIMEOUT))
            SCORE=$(awk "BEGIN { printf \"%.2f\", ($KILLED / $TOTAL) * 100 }")
            echo "Mutantes mortos: $KILLED"
            echo "Sobreviventes: $SURVIVED"
            echo "Suspeitos: $SUSPICIOUS"
            echo "Timeouts: $TIMEOUT"
            echo "Score de mutação: $SCORE%"