name: Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Executar testes e cobertura
        run: python -m pytest

      - name: Executar testes de mutação nos serviços
        run: |
          rm -f .mutmut-cache .mutmut-cache-journal
          python -m mutmut run \
            --CI \
            --paths-to-mutate app/services \
            --runner "python -m pytest -q tests/test_cupons.py tests/test_pedidos.py tests/test_pagamentos.py tests/test_regras_negocio.py tests/test_bva_particionamento.py"
          python -m mutmut results